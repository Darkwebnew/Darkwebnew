<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060810"/>
      <stop offset="40%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2040"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5d4;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00f5d4"/>
      <stop offset="70%" style="stop-color:#5291ff"/>
      <stop offset="100%" style="stop-color:#5291ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>
  <rect x="0" y="165" width="900" height="2" fill="url(#line)" opacity="0.6"/>
  <text x="450" y="85" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="56" font-weight="700" fill="#e8edf8" filter="url(#glow)" letter-spacing="8">SRIRAM V</text>
  <text x="450" y="120" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="15" fill="#5291ff" letter-spacing="3">AI ENGINEER  ·  CLOUD ARCHITECT  ·  CYBERSECURITY SPECIALIST</text>
  <text x="450" y="150" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#00f5d4" opacity="0.8">🏆 IBM Z Datathon 2025 — 2nd Place  ·  Chennai, India 🇮🇳  ·  Open to Work</text>
  <circle cx="40" cy="40" r="2" fill="#00f5d4" opacity="0.5"/>
  <circle cx="860" cy="40" r="2" fill="#5291ff" opacity="0.5"/>
  <circle cx="40" cy="160" r="2" fill="#5291ff" opacity="0.5"/>
  <circle cx="860" cy="160" r="2" fill="#00f5d4" opacity="0.5"/>
</svg>
